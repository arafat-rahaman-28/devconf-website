	<head>

		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap"

		<title>DevConf - 2026</title>
		<link rel="stylesheet" href="styles/style.css" />

	<body>
		<header>
			<nav class="container">
				<div class="left-section">
					<img src="assets/logo.png" alt="Logo of the DevConf 2026" />
				</div>
				<div class="middle-section">
					<ul>
						<li><a href="">Speakers</a></li>
						<li><a href="">Schedule</a></li>
						<li><a href="">Tracks</a></li>
						<li><a href="">Venue</a></li>
						<li><a href="">Blog</a></li>
					</ul>
				</div>
				<div class="right-section">
					<button class="primary-button">Register Now</button>
				</div>
			</nav>
			<section class="banner">
				<h1>Code.<em>Connect</em>.Create</h1>
				<p class="banner-sub-heading">
					Join 4,000+ engineers, founders, and builders at the premier
					developer conference of 2026. Three days of cutting-edge
					talks, hands-on workshops, and meaningful connections.
				</p>
				<button class="primary-button primary-button-modification">
					Register Now
				</button>
			</section>
		</header>
		<main>
			<section class="speakers-section">
				<h1>Meet the Speakers</h1>
			</section>
